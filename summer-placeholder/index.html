<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wilder PTSA</title>
  <meta name="description" content="Website offline whilst we build new exciting things." />
  <style>
    :root {
      --ink: #1a2332;
      --muted: #5a6577;
      --bg: #f3f6fa;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      gap: 1.25rem;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 650;
      letter-spacing: -0.02em;
      text-align: center;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      text-align: center;
      max-width: 36rem;
      line-height: 1.5;
    }
    img {
      display: block;
      width: min(100%, 1408px);
      height: auto;
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(26, 35, 50, 0.12);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Wilder PTSA</h1>
    <p>Website offline whilst we build new exciting things.</p>
    <img
      src="Wilder-placeholder.png"
      width="1408"
      height="768"
      alt="Wilder PTSA summer placeholder"
    />
  </main>
</body>
</html>
