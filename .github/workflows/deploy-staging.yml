name: Deploy plugin to staging slot

# Source-of-truth policy lives in CONTRIBUTING.md at the repo root.
# Every change to the wilderptsa.net plugin must originate from a
# commit on this repo. No direct Kudu deploys from outside the repo.
#
# Triggers on pushes to BOTH `dev` (the normal feature-flow) and `main`
# (so a hotfix landed directly on main still lands on staging). Production
# is NOT auto-promoted; use promote-prod.yml (manual) or Kudu when ready.

on:
  push:
    branches: [dev, main]
    paths:
      - 'Azure Plugin/**'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: PTSAWebsite
  AZURE_WEBAPP_NAME: wilderptsa
  AZURE_WEBAPP_SLOT: staging
  STAGING_URL: https://wilderptsa-staging-c20b298090-drccadb2badebhh5.z02.azurefd.net
  STAGING_DIRECT_URL: https://wilderptsa-staging.azurewebsites.net

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build plugin zip
        # The zip MUST contain the plugin files at its ROOT (no leading
        # `azure-plugin/` folder). `az webapp deploy --type zip --target-path X`
        # extracts the zip contents *into* X — if the zip has a top-level
        # folder, you get X/azure-plugin/azure-plugin.php (nested junk) instead
        # of X/azure-plugin.php. So we cd INTO the build dir before zipping.
        run: |
          set -euo pipefail
          mkdir -p build
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.cursor' \
            --exclude='*.zip' \
            --exclude='PTATools.wiki' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='tests' \
            --exclude='.DS_Store' \
            "Azure Plugin/" "build/azure-plugin/"
          cd build/azure-plugin
          zip -rq ../../azure-plugin.zip . -x "*.DS_Store"
          cd ../..
          ls -lh azure-plugin.zip

      - name: Azure login (federated identity)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy plugin to staging slot
        # IMPORTANT: target path is "Azure Plugin" (with the space, capitalised)
        # because that's the folder WordPress has registered in active_plugins
        # ("Azure Plugin/azure-plugin.php"). Deploying to the lowercase
        # "azure-plugin" folder is a no-op for the running site — WP won't
        # load it. `--clean true` wipes the target folder before extracting
        # so renamed/removed files don't linger between deploys.
        run: |
          set -euo pipefail
          az webapp deploy \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --slot "$AZURE_WEBAPP_SLOT" \
            --src-path azure-plugin.zip \
            --type zip \
            --target-path "/home/site/wwwroot/wp-content/plugins/Azure Plugin" \
            --clean true
          echo "[OK] Plugin zip deployed to staging slot's 'Azure Plugin' folder"

      - name: Wait for app to pick up new code
        run: sleep 30

      - name: Smoke test staging (tolerant)
        id: smoke
        continue-on-error: true
        run: |
          set -uo pipefail
          # Try Front Door first, fall back to direct App Service hostname.
          FAIL=0

          probe() {
            local label="$1"
            local url="$2"
            for attempt in 1 2 3; do
              local code
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$url/" || echo "000")
              if [ "$code" = "200" ]; then
                echo "[OK]   [$label] returned 200"
                return 0
              elif [ "$code" = "500" ] || [ "$code" = "503" ]; then
                # Slot is up but app errored - deploy succeeded, app is broken pre-existing
                echo "[WARN] [$label] returned $code on attempt $attempt - slot is responding but app has an error (deploy itself succeeded)"
                return 2
              else
                echo "[..]   [$label] attempt $attempt returned $code, retrying in 20s..."
                sleep 20
              fi
            done
            echo "[FAIL] [$label] never responded successfully"
            return 1
          }

          probe "Front Door" "$STAGING_URL" || PROBE_FD=$?
          PROBE_FD=${PROBE_FD:-0}

          probe "Direct"     "$STAGING_DIRECT_URL" || PROBE_DIRECT=$?
          PROBE_DIRECT=${PROBE_DIRECT:-0}

          # Pass: at least one probe got 200
          # Warn: any probe got 500/503 (deploy worked, app has a problem)
          # Fail: both probes never responded
          if [ "$PROBE_FD" = "0" ] || [ "$PROBE_DIRECT" = "0" ]; then
            echo "::notice::Staging deploy succeeded and slot is healthy"
            exit 0
          elif [ "$PROBE_FD" = "2" ] || [ "$PROBE_DIRECT" = "2" ]; then
            echo "::warning::Staging slot is responding but the WP app returned a 5xx error. The deploy itself succeeded (files were written). The app error is likely pre-existing (e.g. WP install issue) and unrelated to this push."
            exit 0
          else
            echo "::error::Staging slot did not respond at all. Deploy may have caused a regression."
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Staging Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: succeeded" >> $GITHUB_STEP_SUMMARY
          echo "- Smoke: ${{ steps.smoke.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Staging URL: $STAGING_URL" >> $GITHUB_STEP_SUMMARY
