name: Promote staging to production

# ⛔ DISABLED at the GitHub Actions level since 2026-06-01.
#
# Routine production deploys for the wilderptsa.net plugin are done with
# a direct Kudu zip deploy (`az webapp deploy` against the production
# slot, no `--slot` arg) — see CONTRIBUTING.md > "Manual Kudu push" and
# .cursor/rules/deployment.mdc. The slot-swap path this workflow
# implements is reserved for FULL-STACK changes (WordPress core upgrade,
# theme swap, multi-plugin coordinated update) where you genuinely need
# the entire wp-content/ tree promoted atomically.
#
# Re-enable from the GitHub Actions UI (or `gh workflow enable promote-prod.yml`)
# only when one of those full-stack scenarios is what you actually need.
# Then dispatch via the UI with a `reason` input.
#
# The workflow_dispatch trigger is also gated on Azure federated identity
# (AADSTS700213 on 2026-06-01 confirmed the OIDC trust on the App
# Registration doesn't include `repo:jaburges/PTATools:ref:refs/heads/main`).
# If you re-enable this, add the federated credential first or it'll
# fail at the `azure/login` step.
#
# Manual-only. Pushes to main deploy to staging via deploy-staging.yml but do
# NOT auto-promote here. Production is updated via Kudu zip deploy after
# validating on staging (default), or by re-enabling this workflow for the
# full-stack edge cases noted above.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for promotion (optional)'
        required: false
        default: 'Manual promotion'

permissions:
  id-token: write
  contents: read

concurrency:
  group: promote-prod
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: PTSAWebsite
  AZURE_WEBAPP_NAME: wilderptsa
  PROD_URL: https://wilderptsa.net
  STAGING_URL: https://wilderptsa-staging-c20b298090-drccadb2badebhh5.z02.azurefd.net

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (federated identity)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Pre-flight - verify staging is healthy
        id: preflight
        run: |
          set -uo pipefail
          # 1. Slot must be Running (cheap az check)
          STATE=$(az webapp show -g "$AZURE_RESOURCE_GROUP" --name "$AZURE_WEBAPP_NAME" \
            --slot staging --query state -o tsv)
          if [ "$STATE" != "Running" ]; then
            echo "::error::Staging slot is not Running (state=$STATE). Aborting promotion."
            exit 1
          fi
          echo "[OK] Staging slot state=Running"

          # 2. HTTP integrity check against the staging slot. This catches
          #    the failure mode that caused the 2026-05-22 outage: staging
          #    looking OK on the homepage (W3 Total Cache HTML cache) but
          #    PHP execution broken on every dynamic request. The next
          #    slot-swap would then move that broken state into production.
          #    We probe THREE endpoints that all go through PHP-FPM:
          #      - homepage (no query \u2014 may hit page cache, weakest check)
          #      - wp-json (always PHP)
          #      - admin-ajax (always PHP)
          STG_DIRECT="https://${AZURE_WEBAPP_NAME}-staging.azurewebsites.net"
          FAIL=0
          for path in "/" "/wp-json/" "/wp-admin/admin-ajax.php?action=heartbeat"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${STG_DIRECT}${path}?_promotecheck=$(date +%s)" || echo "000")
            if [ "$code" = "200" ] || [ "$code" = "400" ]; then
              # admin-ajax with action=heartbeat returns 400 without a nonce, which is fine
              echo "[OK] staging ${path} returned ${code}"
            else
              echo "::error::staging ${path} returned ${code} \u2014 staging looks broken, refusing to swap"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "::error::Staging pre-swap integrity check failed. Fix staging before promoting."
            exit 1
          fi
          echo "[OK] Staging pre-swap integrity check passed"

      - name: Capture pre-swap commit on production (for audit)
        run: |
          echo "Promotion at $(date -u)" > /tmp/promotion-info.txt
          echo "Reason: ${{ github.event.inputs.reason || 'manual workflow_dispatch' }}" >> /tmp/promotion-info.txt
          echo "Commit (HEAD of main): ${{ github.sha }}" >> /tmp/promotion-info.txt
          cat /tmp/promotion-info.txt

      - name: Slot swap staging -> production
        id: swap
        run: |
          set -euo pipefail
          az webapp deployment slot swap \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --slot staging \
            --target-slot production
          echo "swapped=true" >> $GITHUB_OUTPUT
          echo "[OK] Swap complete. New code is live on production."

      - name: Wait for prod to settle
        run: sleep 30

      - name: Smoke test production
        id: smoke
        continue-on-error: true
        run: |
          set -euo pipefail
          chmod +x infra/post-change-smoke.sh
          ./infra/post-change-smoke.sh

      - name: Auto-rollback on smoke failure
        if: steps.swap.outputs.swapped == 'true' && steps.smoke.outcome == 'failure'
        run: |
          set -euo pipefail
          echo "::error::Smoke test failed after swap. Rolling back..."
          # Slot swap is bidirectional. The rollback is the same forward
          # `--slot staging --target-slot production` (the default for
          # --target-slot is "production" anyway) \u2014 it re-swaps the
          # contents that ended up on staging back to production.
          #
          # The previous syntax `--slot production --target-slot staging`
          # is REJECTED by Azure CLI because "production" is not a slot
          # name; it's the canonical app. That's why the auto-rollback
          # failed during the 2026-05-22 outage, leaving the broken state
          # on production for 13 hours.
          az webapp deployment slot swap \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --slot staging
          echo "::warning::Rollback complete. Production restored to previous version. Investigate the failed smoke test and fix the code before re-promoting."
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## Production Promotion" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Reason: ${{ github.event.inputs.reason || 'manual workflow_dispatch' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Swap: ${{ steps.swap.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Smoke: ${{ steps.smoke.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Final: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.smoke.outcome }}" = "failure" ]; then
            echo "- Status: ROLLED BACK" >> $GITHUB_STEP_SUMMARY
          fi
